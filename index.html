<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Game Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Nunito',sans-serif;background:#f0ebe0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
h1{font-size:clamp(28px,6vw,52px);font-weight:900;color:#111;letter-spacing:-1px;margin-bottom:4px;text-align:center;}
h1 span{color:#FFB800;}
.sub{font-size:13px;font-weight:800;color:#999;letter-spacing:3px;margin-bottom:40px;text-align:center;}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;width:100%;max-width:680px;}
.card{background:#fff;border:3px solid #111;border-radius:24px;padding:28px 24px;box-shadow:6px 6px 0 #111;text-decoration:none;color:#111;transition:transform .1s,box-shadow .1s;display:flex;flex-direction:column;gap:10px;}
.card:hover{transform:translateY(-4px);box-shadow:8px 10px 0 #111;}
.card:active{transform:translateY(1px);box-shadow:4px 4px 0 #111;}
.card-icon{font-size:52px;line-height:1;margin-bottom:4px;}
.card-title{font-size:22px;font-weight:900;letter-spacing:-0.5px;}
.card-desc{font-size:12px;font-weight:700;color:#888;line-height:1.6;}
.card-badge{display:inline-block;background:#FFB800;color:#111;font-size:9px;font-weight:900;padding:3px 10px;border-radius:20px;border:2px solid #111;letter-spacing:1px;width:fit-content;}
.card.warsim .card-badge{background:#111;color:#FFB800;}
.footer{margin-top:36px;font-size:10px;font-weight:800;color:#bbb;letter-spacing:2px;text-align:center;}
</style>
</head>
<body>
<h1>GAME <span>HUB</span> 🎮</h1>
<p class="sub">PICK YOUR GAME</p>
<div class="grid">
  <a class="card" href="pugman.html">
    <div class="card-icon">🐾</div>
    <div class="card-badge">ARCADE</div>
    <div class="card-title">PUG-MAN</div>
    <div class="card-desc">Help the pug collect all treats while avoiding the cats. Collect power bones to fight back! 5 unique levels.</div>
  </a>
  <a class="card warsim" href="warsim.html">
    <div class="card-icon">💥</div>
    <div class="card-badge">SIMULATOR</div>
    <div class="card-title">WAR SIMULATOR</div>
    <div class="card-desc">Build your army of soldiers, snipers, heavies and brawlers. Watch them battle it out on 4 maps!</div>
  </a>
</div>
<div class="footer">MADE WITH ❤️</div>
</body>
</html>
